<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Cello-Aufnahme-Tool</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0; font-family: -apple-system, system-ui, sans-serif;
        background: #0f172a; color: #e2e8f0; padding: 12px;
      }
      .bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
      .spacer { flex: 1; }
      button {
        font: inherit; border: 0; border-radius: 12px; padding: 12px 16px;
        background: #1e293b; color: #e2e8f0; cursor: pointer;
      }
      .seg.on { background: #4f46e5; }
      .card { background: #1e293b; border-radius: 18px; padding: 18px; text-align: center; }
      .idx { color: #94a3b8; font-size: .85rem; }
      #vf { background: #fff; border-radius: 12px; margin: 10px 0; min-height: 120px; }
      .title { font-size: 1.6rem; font-weight: 800; color: #fde047; margin: 6px 0 12px; }
      .variants { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px; }
      .vr { font-size: .9rem; padding: 10px 12px; }
      .vr.on { background: #0ea5e9; }
      .takes { color: #94a3b8; font-size: .9rem; margin-bottom: 10px; }
      .rec { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: 800; background: #16a34a; }
      .rec.recording { background: #dc2626; }
      .nav { display: flex; gap: 10px; margin-top: 12px; }
      .nav button { flex: 1; padding: 16px; }
      .hint { color: #94a3b8; font-size: .85rem; margin: 14px 0 0; }
      .ver { color: #64748b; font-size: .7rem; text-align: right; margin: 4px 4px 0; font-family: ui-monospace, monospace; }
      #export { background: #0d9488; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/tools/recorder.ts"></script>
  </body>
</html>
